<!DOCTYPE html>
<html>
<head>
<title>Face Page</title>

<style>

/* P element selector */
p{
    font-size:18px;
    color:black;
}

/* P class selector */
p.float{
    color:blue;
}

/* Image style */
img{
    float:left;
    padding:15px;
    width:200px;
}

</style>

</head>

<body>

<h2>My Face</h2>

<img src="face.png" alt="Face">

<p class="float">This paragraph uses a class selector.</p>

<p>
This is a normal paragraph. The image is floated to the left and
padding gives space between the image and the text so the content
looks neat and readable.
</p>

</body>
</html>
